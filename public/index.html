<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRD HUB - กฟก.3 (Local)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background-color: #f4f6f9; font-family: 'Sarabun', sans-serif; overflow-x: hidden; }
    .bg-purple { background-color: #4a148c; color: white; }
    
    /* === Sidebar Styling === */
    #sidebar {
      width: 260px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 1050;
      background: white;
      border-right: 1px solid #dee2e6;
      transition: all 0.3s ease;
    }
    #sidebar.collapsed { left: -260px; }
    
    #main-wrapper {
      margin-left: 260px;
      transition: all 0.3s ease;
      min-height: 100vh;
    }
    #main-wrapper.full-width { margin-left: 0; }

    .nav-link { color: #333; padding: 12px 20px; border-radius: 8px; margin: 4px 12px; }
    .nav-link:hover { background-color: #f3e5f5; color: #4a148c; }
    .nav-link.active { background-color: #4a148c; color: white; }
    
    /* === Navbar Adjustments === */
    .navbar { z-index: 1040; height: 60px; }
    .user-avatar { width: 32px; height: 32px; object-fit: cover; border-radius: 50%; border: 1px solid white; }
    .nav-user-name { color: white !important; font-weight: 500; cursor: pointer; }

    .app-page { display: none; padding: 30px; }
    .app-page.active { display: block; }
    
    .gold-gradient { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7); color: #4a148c; }
    .purple-gradient { background: linear-gradient(135deg, #4a148c, #311b92); color: white; }
    .quick-menu-card { cursor: pointer; transition: 0.3s; border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .quick-menu-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div id="login-section">
    <div class="container d-flex justify-content-center align-items-center vh-100">
      <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px; border-radius: 15px;">
        <div class="text-center mb-4">
          <i class="bi bi-lightning-charge-fill text-warning" style="font-size: 3rem;"></i>
          <h3 class="mt-2 text-purple" style="font-weight: bold;">HRD HUB กฟก.3</h3>
          <p class="text-muted">Local Server Engine</p>
        </div>
        <form onsubmit="event.preventDefault(); handleLogin();">
          <div class="mb-3"><input type="number" class="form-control" id="loginEmpId" required placeholder="รหัสพนักงาน"></div>
          <div class="mb-3"><input type="password" class="form-control" id="loginPassword" required placeholder="รหัสผ่าน"></div>
          <button type="submit" class="btn w-100 text-white bg-purple" id="btnLogin">เข้าสู่ระบบ</button>
        </form>
      </div>
    </div>
  </div>

  <div id="app-section" style="display: none;">
    
    <nav id="sidebar">
      <div class="p-4 border-bottom text-center">
        <h5 class="fw-bold text-purple mb-0">เมนูควบคุม</h5>
      </div>
      <div class="mt-3">
        <a href="#" class="nav-link active" onclick="switchPage('page-home')" id="link-home"><i class="bi bi-house-door me-3"></i>หน้าแรก</a>
        <a href="#" class="nav-link" onclick="switchPage('page-profile')" id="link-profile"><i class="bi bi-person-badge me-3"></i>โปรไฟล์ของฉัน</a>
        <a href="#" class="nav-link" onclick="switchPage('page-global-dash')" id="link-global"><i class="bi bi-globe2 me-3"></i>ภาพรวมองค์กร</a>
        <hr class="mx-3">
        <a href="#" class="nav-link text-danger" onclick="location.reload()"><i class="bi bi-box-arrow-left me-3"></i>ออกจากระบบ</a>
      </div>
    </nav>

    <div id="main-wrapper">
      <nav class="navbar navbar-expand-lg navbar-dark bg-purple sticky-top">
        <div class="container-fluid">
          <button class="btn btn-outline-light border-0 me-2" onclick="toggleSidebar()"><i class="bi bi-list fs-4"></i></button>
          <a class="navbar-brand fw-bold" href="#">HRD HUB</a>
          
          <div class="ms-auto dropdown">
            <div class="nav-user-name d-flex align-items-center dropdown-toggle" data-bs-toggle="dropdown">
              <span id="navUserText" class="me-2 small">Loading...</span>
              <img id="navUserPic" src="https://via.placeholder.com/40" class="user-avatar shadow-sm">
            </div>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
              <li><a class="dropdown-item py-2" href="#" onclick="switchPage('page-profile')"><i class="bi bi-person me-2"></i>ดูโปรไฟล์</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item py-2 text-danger" href="#" onclick="location.reload()"><i class="bi bi-power me-2"></i>ออกจากระบบ</a></li>
            </ul>
          </div>
        </div>
      </nav>

      <div id="main-content">
        
        <div id="page-home" class="app-page active">
           <div id="homeCarouselContainer" class="mb-4"></div>
           <h5 class="fw-bold text-purple mb-3">เมนูด่วน</h5>
           <div class="row g-3" id="announcementListContainer"></div>
        </div>

        <div id="page-profile" class="app-page">
          <div class="card border-0 shadow-sm p-4" style="border-radius: 20px;">
            <div class="text-center mb-4">
              <img id="profilePicBig" src="https://via.placeholder.com/150" class="rounded-circle shadow" style="width:150px; height:150px; object-fit:cover; border:5px solid #f3e5f5;">
              <h2 id="profileName" class="fw-bold text-purple mt-3 mb-1">-</h2>
              <p id="profileDept" class="text-muted">-</p>
            </div>
            <div class="row g-3 text-center border-top pt-4">
              <div class="col-md-4"><small class="text-muted d-block">รหัสพนักงาน</small><span id="profileEmpId" class="fw-bold">-</span></div>
              <div class="col-md-4"><small class="text-muted d-block">ตำแหน่ง</small><span id="profilePosition" class="fw-bold">-</span></div>
              <div class="col-md-4"><small class="text-muted d-block">ระดับ</small><span id="profileLevel" class="fw-bold">-</span></div>
            </div>
          </div>
        </div>

        <div id="page-global-dash" class="app-page">
          <div class="row g-4">
            <div class="col-md-4"><div class="card p-4 gold-gradient shadow-sm border-0"><h6>คะแนนรวม</h6><h1 id="gdTotalScore">0</h1></div></div>
            <div class="col-md-4"><div class="card p-4 purple-gradient shadow-sm border-0"><h6>พนักงานทั้งหมด</h6><h1 id="gdTotalStaff">0</h1></div></div>
            <div class="col-md-4"><div class="card p-4 bg-white shadow-sm border-0"><h6>ค่าเฉลี่ย</h6><h1 id="gdAvgScore">0</h1></div></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentUser = null;
    let allAnnouncementsData = [];

    // --- 1. ระบบ Sidebar & Navigation ---
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('main-wrapper').classList.toggle('full-width');
    }

    function switchPage(pageId) {
      // ซ่อนทุกหน้า
      document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
      // ลบไฮไลท์เมนู
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      
      // แสดงหน้าที่เลือก
      document.getElementById(pageId).classList.add('active');
      
      // ไฮไลท์เมนูที่เลือก
      if(pageId === 'page-home') { document.getElementById('link-home').classList.add('active'); loadHomeData(); }
      if(pageId === 'page-profile') { document.getElementById('link-profile').classList.add('active'); loadUserProfile(); }
      if(pageId === 'page-global-dash') { document.getElementById('link-global').classList.add('active'); renderGlobalDashboard(); }
      
      // ถ้าเป็นมือถือ ให้ซ่อน Sidebar อัตโนมัติเมื่อกดเปลี่ยนหน้า
      if(window.innerWidth < 992) toggleSidebar();
    }

    // --- 2. ระบบ Login ---
    async function handleLogin() {
      const empId = document.getElementById('loginEmpId').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('btnLogin');
      btn.innerHTML = 'ตรวจสอบ...';
      btn.disabled = true;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: empId, password: password })
        });
        const result = await response.json();
        btn.innerHTML = 'เข้าสู่ระบบ'; btn.disabled = false;

        if (result.success) {
          currentUser = result.user;
          showMainApp();
        } else { alert(result.message); }
      } catch (e) { alert("Server ออฟไลน์ครับกัปตัน!"); btn.disabled = false; }
    }

    function showMainApp() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('app-section').style.display = 'block';
      
      // ตั้งค่าชื่อผู้ใช้ที่ Navbar (สีขาวเห็นชัด)
      document.getElementById('navUserText').innerText = currentUser.FullName;
      if(currentUser.ProfilePic) {
        document.getElementById('navUserPic').src = currentUser.ProfilePic;
      }
      
      switchPage('page-home');
    }

    // --- 3. ระบบข้อมูลโปรไฟล์ ---
    async function loadUserProfile() {
      if(!currentUser) return;
      try {
        const response = await fetch(`/api/profile/${currentUser.EmpID}`);
        const result = await response.json();
        if(result.success) {
          const u = result.user;
          document.getElementById('profileName').innerText = u.FullName;
          document.getElementById('profileDept').innerText = u.FullDept;
          document.getElementById('profileEmpId').innerText = u.EmpID;
          document.getElementById('profilePosition').innerText = u.FullPosition;
          document.getElementById('profileLevel').innerText = u.Level;
          if(u.ProfilePic) document.getElementById('profilePicBig').src = u.ProfilePic;
        }
      } catch(e) { console.error(e); }
    }

    // --- 4. ระบบ Global Stats ---
    async function renderGlobalDashboard() {
      try {
        const response = await fetch('/api/global-stats');
        const data = await response.json();
        if(data.success) {
          document.getElementById('gdTotalScore').innerText = data.totalScore;
          document.getElementById('gdTotalStaff').innerText = data.totalStaff;
          document.getElementById('gdAvgScore').innerText = data.avgScore;
        }
      } catch(e) { console.error(e); }
    }

    // --- 5. ระบบประกาศ (หน้าแรก) ---
    async function loadHomeData() {
      try {
        const response = await fetch('/api/announcements');
        const data = await response.json();
        if(data.success) {
          // ตรงนี้กัปตันใช้โค้ดวาดประกาศ (renderBanners) เดิมได้เลยครับ
          // ผมละไว้เพื่อความกระชับ
        }
      } catch(e) { console.error(e); }
    }
  </script>
</body>
</html>
