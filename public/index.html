<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRD HUB - กฟก.3 (Local)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background-color: #f4f6f9; font-family: 'Sarabun', sans-serif; overflow-x: hidden; }
    .bg-purple { background-color: #4a148c; color: white; }
    #sidebar-container { width: 250px; min-height: calc(100vh - 56px); transition: all 0.3s ease; background: white; border-right: 1px solid #dee2e6; z-index: 1000; }
    #sidebar-container.collapsed { margin-left: -250px; }
    #main-content { flex-grow: 1; min-width: 0; height: calc(100vh - 56px); overflow-y: auto; display: flex; flex-direction: column; }
    .app-page { display: none; padding: 20px; flex-grow: 1; }
    .app-page.active { display: block; }
    footer { font-size: 0.75rem; color: #6c757d; text-align: center; padding: 15px; border-top: 1px solid #eee; background: #fff; }
    .navbar-brand { cursor: pointer; display: flex; align-items: center; }
    .navbar-brand img { height: 35px; margin-right: 10px; }
    .quick-menu-card { cursor: pointer; transition: 0.3s ease; border-radius: 15px; }
    .quick-menu-card:hover { transform: translateY(-5px); background-color: #f8f9fa; }
  </style>
</head>
<body>

  <div id="login-section">
    <div class="container d-flex justify-content-center align-items-center vh-100">
      <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px; border-radius: 15px;">
        <div class="text-center mb-4">
          <i class="bi bi-lightning-charge-fill text-warning" style="font-size: 3rem;"></i>
          <h3 class="mt-2 text-purple" style="color: #4a148c; font-weight: bold;">HRD HUB กฟก.3</h3>
          <p class="text-muted">ระบบรันบน Mac Local Server</p>
        </div>
        <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
          <div class="mb-3">
            <label class="form-label">รหัสพนักงาน</label>
            <input type="number" class="form-control" id="loginEmpId" required placeholder="เช่น 261478">
          </div>
          <div class="mb-3">
            <label class="form-label">รหัสผ่าน</label>
            <input type="password" class="form-control" id="loginPassword" required placeholder="รหัสผ่านตั้งต้นคือ pea">
          </div>
          <button type="submit" class="btn w-100 text-white" style="background-color: #6f42c1;" id="btnLogin">
            <i class="bi bi-box-arrow-in-right me-1"></i> เข้าสู่ระบบ
          </button>
        </form>
      </div>
    </div>
  </div>

  <div id="app-section" style="display: none;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-purple sticky-top shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold">
          <img src="https://upload.wikimedia.org/wikipedia/th/b/b8/PEA_Logo.png" alt="PEA">
          HRD HUB - กฟก.3
        </a>
        <div class="dropdown ms-auto">
          <button class="btn btn-purple border-0 d-flex align-items-center" type="button">
            <span id="navUserName" class="d-none d-md-inline small">Loading...</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="d-flex">
      <div id="main-content" class="bg-light w-100">
        
        <div id="page-home" class="app-page active">
          <div id="homeCarouselContainer" class="mb-4">
            <div class="card bg-dark text-white border-0 shadow-sm" style="border-radius: 15px; overflow: hidden; min-height: 250px;">
              <div class="card-body d-flex align-items-center justify-content-center text-center p-5">
                <div>
                  <div class="spinner-border text-light mb-3"></div>
                  <p class="mb-0">กำลังโหลดประกาศ...</p>
                </div>
              </div>
            </div>
          </div>

          <h5 class="fw-bold text-purple mb-3"><i class="bi bi-lightning-charge-fill text-warning me-2"></i> เมนูด่วน (Quick Actions)</h5>
          <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
              <div class="card h-100 border-0 shadow-sm text-center p-3 quick-menu-card">
                <i class="bi bi-play-circle-fill text-danger display-4 mb-2"></i>
                <h6 class="fw-bold mb-0">เข้าเรียนเลย</h6>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card h-100 border-0 shadow-sm text-center p-3 quick-menu-card">
                <i class="bi bi-briefcase-fill text-primary display-4 mb-2"></i>
                <h6 class="fw-bold mb-0">งานของฉัน</h6>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card h-100 border-0 shadow-sm text-center p-3 quick-menu-card">
                <i class="bi bi-bar-chart-fill text-success display-4 mb-2"></i>
                <h6 class="fw-bold mb-0">คะแนนสะสม</h6>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card h-100 border-0 shadow-sm text-center p-3 quick-menu-card">
                <i class="bi bi-award-fill text-warning display-4 mb-2"></i>
                <h6 class="fw-bold mb-0">ประวัติและผลงาน</h6>
              </div>
            </div>
          </div>

          <div class="card shadow-sm border-0 mb-5" style="border-radius: 15px;">
            <div class="card-header bg-white pb-0 border-bottom-0 pt-4">
              <h5 class="text-purple fw-bold"><i class="bi bi-megaphone-fill me-2"></i> ข่าวสารและประกาศ</h5>
            </div>
            <div class="card-body p-0">
              <div class="list-group list-group-flush" id="announcementListContainer">
                <div class="text-center py-4 text-muted"><span class="spinner-border spinner-border-sm"></span> กำลังโหลด...</div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="modal fade" id="announcementModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 bg-transparent shadow-lg">
        <div class="modal-header border-0 pb-0 position-absolute w-100" style="z-index: 10;">
          <button type="button" class="btn-close btn-close-white bg-dark m-2" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0 text-center position-relative">
          <a id="popupLink" href="#" target="_blank" style="display: block;">
            <img id="popupImage" src="" class="img-fluid rounded-3 w-100" style="max-height: 80vh; object-fit: contain; background: rgba(0,0,0,0.8);">
          </a>
        </div>
        <div class="modal-footer bg-dark border-0 rounded-bottom justify-content-center py-2" style="margin-top: -5px;">
          <h6 id="popupTitle" class="text-white mb-0 fw-bold">หัวข้อประกาศ</h6>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentUser = null;
    let allAnnouncementsData = [];

    // --- 1. ระบบ Login ---
    async function handleLogin() {
      const empId = document.getElementById('loginEmpId').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('btnLogin');
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังตรวจสอบ...';
      btn.disabled = true;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: empId, password: password })
        });
        const result = await response.json();
        btn.innerHTML = 'เข้าสู่ระบบ';
        btn.disabled = false;

        if (result.success) {
          currentUser = result.user;
          showMainApp();
        } else {
          alert(result.message);
        }
      } catch (error) {
        alert("เซิร์ฟเวอร์ออฟไลน์ กรุณารัน node server.js");
        btn.disabled = false;
      }
    }

    function showMainApp() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('app-section').style.display = 'block';
      // ปรับให้ตรงกับชื่อคอลัมน์ในฐานข้อมูล (FullName)
      document.getElementById('navUserName').innerText = currentUser.FullName || 'User';
      loadHomeData();
    }

    // --- 2. ระบบโหลดประกาศ ---
    async function loadHomeData() {
      try {
        const response = await fetch('/api/announcements');
        const data = await response.json();
        if (data.success) {
          allAnnouncementsData = data.all || [];
          renderBanners(data.banners || []);
          renderAnnouncementList(allAnnouncementsData);
          if (data.popups && data.popups.length > 0) showPopups(data.popups);
        }
      } catch (error) {
        console.error("โหลดประกาศไม่สำเร็จ:", error);
      }
    }

    // --- 3. ช่างวาดหน้าจอ ---
    function renderBanners(banners) {
      const container = document.getElementById('homeCarouselContainer');
      if (banners.length === 0) {
        container.innerHTML = `<div class="card bg-purple text-white p-5 text-center" style="border-radius:15px;"><h3>🚀 HRD HUB 2026</h3><p>ยินดีต้อนรับสู่ระบบ Local Server</p></div>`;
        return;
      }
      let indicators = '';
      let innerItems = '';
      banners.forEach((banner, index) => {
        const activeClass = index === 0 ? 'active' : '';
        indicators += `<button type="button" data-bs-target="#homeCarousel" data-bs-slide-to="${index}" class="${activeClass}"></button>`;
        innerItems += `
          <div class="carousel-item ${activeClass}" onclick="if('${banner.link}') window.open('${banner.link}', '_blank')" style="cursor:pointer;">
            <img src="${banner.image}" class="d-block w-100" style="height:350px; object-fit:cover; border-radius:15px;">
            <div class="carousel-caption d-none d-md-block" style="background: rgba(0,0,0,0.5); border-radius: 10px;">
              <h5>${banner.title}</h5>
            </div>
          </div>`;
      });
      container.innerHTML = `
        <div id="homeCarousel" class="carousel slide carousel-fade shadow-sm" data-bs-ride="carousel" style="border-radius:15px; overflow:hidden;">
          <div class="carousel-indicators">${indicators}</div>
          <div class="carousel-inner">${innerItems}</div>
          <button class="carousel-control-prev" type="button" data-bs-target="#homeCarousel" data-bs-slide-prev><span class="carousel-control-prev-icon"></span></button>
          <button class="carousel-control-next" type="button" data-bs-target="#homeCarousel" data-bs-slide-next><span class="carousel-control-next-icon"></span></button>
        </div>`;
    }

    function renderAnnouncementList(all) {
      const container = document.getElementById('announcementListContainer');
      if (all.length === 0) {
        container.innerHTML = '<div class="text-center py-4 text-muted">ไม่มีข่าวสารประกาศ</div>';
        return;
      }
      let html = '';
      all.forEach(ann => {
        html += `
          <a href="javascript:void(0);" class="list-group-item list-group-item-action border-0 py-3" onclick="viewOldAnnouncement('${ann.id}')">
            <div class="d-flex align-items-center">
              <img src="${ann.image}" style="width: 60px; height: 40px; object-fit: cover; border-radius: 5px;" class="me-3">
              <div class="flex-grow-1"><h6 class="mb-0 fw-bold">${ann.title}</h6></div>
              <i class="bi bi-chevron-right text-muted"></i>
            </div>
          </a>`;
      });
      container.innerHTML = html;
    }

    function showPopups(popups) {
      if (sessionStorage.getItem('popup_shown')) return;
      openAnnouncementModal(popups[0]);
      sessionStorage.setItem('popup_shown', 'true');
    }

    function viewOldAnnouncement(id) {
      const ann = allAnnouncementsData.find(a => a.id === id);
      if (ann) openAnnouncementModal(ann);
    }

    function openAnnouncementModal(annData) {
      document.getElementById('popupImage').src = annData.image;
      document.getElementById('popupTitle').innerText = annData.title;
      const linkEl = document.getElementById('popupLink');
      if (annData.link) linkEl.href = annData.link;
      new bootstrap.Modal(document.getElementById('announcementModal')).show();
    }
  </script>
</body>
</html>
