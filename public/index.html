<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRD HUB - กฟก.3 (Local)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background-color: #f4f6f9; font-family: 'Sarabun', sans-serif; overflow-x: hidden; }
    .bg-purple { background-color: #4a148c; color: white; }
    /* Sidebar CSS */
    #sidebar-container { width: 250px; transition: all 0.3s ease; background: white; border-right: 1px solid #dee2e6; z-index: 1000; height: calc(100vh - 60px); overflow-y: auto; }
    #sidebar-container.collapsed { margin-left: -250px; }
    /* Main Content CSS */
    #main-content { flex-grow: 1; min-width: 0; height: calc(100vh - 60px); overflow-y: auto; }
    /* Page Switcher CSS */
    .app-page { display: none; }
    .app-page.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    /* Custom Cards CSS */
    .quick-menu-card { cursor: pointer; transition: 0.3s ease; border-radius: 15px; }
    .quick-menu-card:hover { transform: translateY(-5px); background-color: #f8f9fa; }
    .gold-gradient { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7); color: #4a148c; }
    .purple-gradient { background: linear-gradient(135deg, #4a148c, #311b92); color: white; }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); border-radius: 15px; }
  </style>
</head>
<body>

  <div id="login-section">
    <div class="container d-flex justify-content-center align-items-center vh-100">
      <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px; border-radius: 15px;">
        <div class="text-center mb-4">
          <i class="bi bi-lightning-charge-fill text-warning" style="font-size: 3rem;"></i>
          <h3 class="mt-2 text-purple" style="color: #4a148c; font-weight: bold;">HRD HUB กฟก.3</h3>
          <p class="text-muted">ระบบรันบน Mac Local Server</p>
        </div>
        <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
          <div class="mb-3">
            <label class="form-label">รหัสพนักงาน</label>
            <input type="number" class="form-control" id="loginEmpId" required placeholder="เช่น 261478">
          </div>
          <div class="mb-3">
            <label class="form-label">รหัสผ่าน</label>
            <input type="password" class="form-control" id="loginPassword" required placeholder="รหัสผ่านตั้งต้นคือ pea">
          </div>
          <button type="submit" class="btn w-100 text-white" style="background-color: #6f42c1;" id="btnLogin">
            <i class="bi bi-box-arrow-in-right me-1"></i> เข้าสู่ระบบ
          </button>
        </form>
      </div>
    </div>
  </div>

  <div id="app-section" style="display: none;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-purple sticky-top shadow-sm" style="height: 60px;">
      <div class="container-fluid">
        <button class="btn btn-purple text-white border-0 me-2" id="sidebarToggle" onclick="toggleSidebar()">
          <i class="bi bi-list fs-4"></i>
        </button>
        <a class="navbar-brand fw-bold">
          <img src="https://upload.wikimedia.org/wikipedia/th/b/b8/PEA_Logo.png" alt="PEA" height="30">
          HRD HUB - กฟก.3
        </a>
        <div class="dropdown ms-auto">
          <button class="btn btn-purple text-white border-0 d-flex align-items-center dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <img id="navProfilePic" src="https://via.placeholder.com/30" class="rounded-circle me-2" style="width:30px; height:30px; object-fit:cover;">
            <span id="navUserName" class="d-none d-md-inline small fw-bold">Loading...</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" style="border-radius: 10px;">
            <li><a class="dropdown-item py-2" href="#" onclick="switchPage('page-profile')"><i class="bi bi-person-badge text-purple me-2"></i> โปรไฟล์ของฉัน</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item py-2 text-danger" href="#" onclick="handleLogout()"><i class="bi bi-box-arrow-right me-2"></i> ออกจากระบบ</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="d-flex" style="overflow: hidden;">
      
      <div id="sidebar-container" class="shadow-sm pt-3">
        <ul class="nav flex-column" id="sidebarMenu">
          </ul>
      </div>

      <div id="main-content" class="bg-light w-100 p-3 p-md-4">
        
        <div id="page-home" class="app-page active">
          <div id="homeCarouselContainer" class="mb-4">
            <div class="card bg-dark text-white border-0 shadow-sm" style="border-radius: 15px; overflow: hidden; min-height: 250px;">
              <div class="card-body d-flex align-items-center justify-content-center text-center p-5">
                <div class="spinner-border text-light mb-3"></div>
              </div>
            </div>
          </div>
          <h5 class="fw-bold text-purple mb-3"><i class="bi bi-lightning-charge-fill text-warning me-2"></i> เมนูด่วน (Quick Actions)</h5>
          <div class="row g-3 mb-4">
            <div class="col-6 col-md-3"><div class="card h-100 border-0 shadow-sm text-center p-3 quick-menu-card"><i class="bi bi-play-circle-fill text-danger display-4 mb-2"></i><h6 class="fw-bold mb-0">เข้าเรียนเลย</h6></div></div>
            <div class="col-6 col-md-3"><div class="card h-100 border-0 shadow-sm text-center p-3 quick-menu-card"><i class="bi bi-briefcase-fill text-primary display-4 mb-2"></i><h6 class="fw-bold mb-0">งานของฉัน</h6></div></div>
            <div class="col-6 col-md-3"><div class="card h-100 border-0 shadow-sm text-center p-3 quick-menu-card" onclick="switchPage('page-global-dash')"><i class="bi bi-bar-chart-fill text-success display-4 mb-2"></i><h6 class="fw-bold mb-0">คะแนนรวมเขต</h6></div></div>
            <div class="col-6 col-md-3"><div class="card h-100 border-0 shadow-sm text-center p-3 quick-menu-card" onclick="switchPage('page-profile')"><i class="bi bi-person-badge-fill text-warning display-4 mb-2"></i><h6 class="fw-bold mb-0">โปรไฟล์</h6></div></div>
          </div>
          <div class="card shadow-sm border-0 mb-5" style="border-radius: 15px;">
            <div class="card-header bg-white pb-0 border-bottom-0 pt-4"><h5 class="text-purple fw-bold"><i class="bi bi-megaphone-fill me-2"></i> ข่าวสารและประกาศ</h5></div>
            <div class="card-body p-0"><div class="list-group list-group-flush" id="announcementListContainer"></div></div>
          </div>
        </div>

        <div id="page-profile" class="app-page">
          <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
              <div class="card border-0 shadow-sm p-4" style="border-radius: 20px;">
                    <div class="text-center mb-4">
                  <div class="position-relative d-inline-block">
                    <img id="profilePicBig" src="https://via.placeholder.com/150" class="rounded-circle shadow-sm" style="width:150px; height:150px; object-fit:cover; border: 5px solid #f3e5f5;">
                    <button class="btn btn-purple rounded-circle position-absolute bottom-0 end-0 shadow" style="width:40px; height:40px;" onclick="document.getElementById('profilePicInput').click()">
                      <i class="bi bi-camera-fill text-white"></i>
                    </button>
                    <input type="file" id="profilePicInput" accept="image/*" style="display:none;" onchange="uploadProfilePic(event)">
                  </div>
                  <h3 id="profileName" class="fw-bold text-purple mt-3 mb-1">ชื่อ-นามสกุล</h3>
                  <span class="badge bg-purple px-3 py-2 rounded-pill" id="profileRole">Role</span>
                </div>

                <div class="bg-light p-3 rounded-3 mb-4">
                  <div class="row g-3">
                    <div class="col-6"><label class="small text-muted mb-1">รหัสพนักงาน</label><h6 id="profileEmpId" class="fw-bold text-dark">-</h6></div>
                    <div class="col-6"><label class="small text-muted mb-1">ระดับ</label><h6 id="profileLevel" class="fw-bold text-dark">-</h6></div>
                    <div class="col-12"><label class="small text-muted mb-1">สังกัดแผนก</label><h6 id="profileDept" class="fw-bold text-dark">-</h6></div>
                    <div class="col-12"><label class="small text-muted mb-1">ตำแหน่ง</label><h6 id="profilePosition" class="fw-bold text-dark">-</h6></div>
                  </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                  <button class="btn btn-outline-purple w-100 rounded-pill fw-bold" onclick="openEditProfile()"><i class="bi bi-pencil-square me-1"></i> แก้ไขข้อมูล</button>
                  <button class="btn btn-warning text-dark w-100 rounded-pill fw-bold" onclick="openChangePassword()"><i class="bi bi-key-fill me-1"></i> เปลี่ยนรหัส</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="page-global-dash" class="app-page"></div>

      </div> </div> </div>

  <div class="modal fade" id="announcementModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 bg-transparent shadow-lg">
        <div class="modal-header border-0 pb-0 position-absolute w-100" style="z-index: 10;">
          <button type="button" class="btn-close btn-close-white bg-dark m-2" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0 text-center position-relative">
          <a id="popupLink" href="#" target="_blank" style="display: block;">
            <img id="popupImage" src="" class="img-fluid rounded-3 w-100" style="max-height: 80vh; object-fit: contain; background: rgba(0,0,0,0.8);">
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editProfileModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-purple text-white border-0">
          <h5 class="modal-title"><i class="bi bi-person-lines-fill me-2"></i> แก้ไขข้อมูลส่วนตัว</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="editProfileForm" onsubmit="event.preventDefault(); saveProfile();">
            <div class="mb-2"><label class="small text-muted">ชื่อ-นามสกุล</label><input type="text" id="editFullName" class="form-control" required></div>
            <div class="mb-2"><label class="small text-muted">ชื่อย่อแผนก</label><input type="text" id="editShortDept" class="form-control" required></div>
            <div class="mb-2"><label class="small text-muted">ชื่อเต็มแผนก</label><input type="text" id="editFullDept" class="form-control" required></div>
            <div class="mb-2"><label class="small text-muted">ระดับ</label><input type="text" id="editLevel" class="form-control"></div>
            <div class="mb-3"><label class="small text-muted">ตำแหน่งเต็ม</label><input type="text" id="editPosition" class="form-control"></div>
            <button type="submit" class="btn btn-purple w-100" id="btnSaveProfile">บันทึกการเปลี่ยนแปลง</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="changePasswordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-warning border-0">
          <h5 class="modal-title text-dark"><i class="bi bi-shield-lock-fill me-2"></i> เปลี่ยนรหัสผ่าน</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="changePasswordForm" onsubmit="event.preventDefault(); savePassword();">
            <div class="mb-2"><input type="password" id="newPassword" class="form-control" placeholder="รหัสผ่านใหม่" required></div>
            <div class="mb-3"><input type="password" id="confirmPassword" class="form-control" placeholder="ยืนยันรหัสผ่านใหม่" required></div>
            <button type="submit" class="btn btn-dark w-100" id="btnSavePassword">บันทึกรหัสผ่านใหม่</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentUser = null;
    let allAnnouncementsData = [];

    // --- 1. ระบบ Login ---
    async function handleLogin() {
      const empId = document.getElementById('loginEmpId').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('btnLogin');
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังตรวจสอบ...';
      btn.disabled = true;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: empId, password: password })
        });
        const result = await response.json();
        btn.innerHTML = 'เข้าสู่ระบบ';
        btn.disabled = false;

        if (result.success) {
          currentUser = result.user;
          showMainApp();
        } else {
          alert(result.message);
        }
      } catch (error) {
        alert("เซิร์ฟเวอร์ออฟไลน์");
        btn.disabled = false;
      }
    }

    function showMainApp() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('app-section').style.display = 'block';
      document.getElementById('navUserName').innerText = currentUser.FullName || 'User';
      if(currentUser.ProfilePic) document.getElementById('navProfilePic').src = currentUser.ProfilePic;
      
      renderSidebar();
      switchPage('page-home'); 
    }

    // --- 2. ระบบนำทาง (Navigation & Pages) ---
    const menuConfig = [
      { id: 'page-home', name: 'หน้าแรก', icon: 'bi-house-heart', roles: ['User', 'Admin', 'Executive'] },
      { id: 'page-global-dash', name: 'ภาพรวมองค์กร', icon: 'bi-globe-asia-australia', roles: ['Admin', 'Executive', 'User'] },
      { id: 'page-profile', name: 'โปรไฟล์ของฉัน', icon: 'bi-person-badge', roles: ['User', 'Admin', 'Executive'] }
    ];

    function renderSidebar() {
      const sidebarMenu = document.getElementById('sidebarMenu');
      sidebarMenu.innerHTML = '';
      const userRole = currentUser.Role || 'User';

      menuConfig.forEach(item => {
        if (item.roles.includes(userRole)) {
          sidebarMenu.innerHTML += `
            <li class="nav-item mb-1 mx-2">
              <a href="javascript:void(0);" id="nav-${item.id}" class="nav-link text-dark d-flex align-items-center p-2 rounded-3" onclick="switchPage('${item.id}')">
                <i class="bi ${item.icon} me-3 fs-5 text-purple"></i><span class="fw-bold">${item.name}</span>
              </a>
            </li>`;
        }
      });
    }

    function toggleSidebar() {
      document.getElementById('sidebar-container').classList.toggle('collapsed');
    }

    function handleLogout() {
      currentUser = null;
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('app-section').style.display = 'none';
    }

    async function switchPage(pageId) {
      // ซ่อนทุกหน้า
      document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
      // ลบไฮไลท์เมนูด้านซ้าย
      document.querySelectorAll('#sidebarMenu .nav-link').forEach(link => {
        link.classList.remove('active', 'text-white');
        link.style.backgroundColor = '';
        link.classList.add('text-dark');
      });
      
      // เปิดหน้าที่เลือก
      const target = document.getElementById(pageId);
      if (target) {
        target.classList.add('active');
        // ไฮไลท์เมนูด้านซ้าย
        const activeLink = document.getElementById('nav-' + pageId);
        if (activeLink) {
          activeLink.classList.remove('text-dark');
          activeLink.classList.add('active', 'text-white');
          activeLink.style.backgroundColor = '#4a148c';
        }

        // 🌟 ท่าไม้ตาย Lazy Load: ไปดูดไฟล์ HTML มาแปะถ้ากล่องมันว่างเปล่า
        if (target.innerHTML.trim() === '') {
          try {
            const res = await fetch(`/pages/${pageId}.html`);
            if (res.ok) {
              target.innerHTML = await res.text();
            } else {
              console.warn(`ไม่พบไฟล์: /pages/${pageId}.html`);
            }
          } catch (error) {
            console.error("โหลดหน้าเว็บล้มเหลว:", error);
          }
        }

        // โหลดข้อมูลตามหน้าที่กด
        if (pageId === 'page-home') loadHomeData();
        if (pageId === 'page-profile') loadUserProfile();
        if (pageId === 'page-global-dash') renderGlobalDashboard();
      }
    }

    // --- 3. ดึงข้อมูล API ---
    async function loadHomeData() {
      try {
        const response = await fetch('/api/announcements');
        const data = await response.json();
        if (data.success) {
          allAnnouncementsData = data.all || [];
          renderBanners(data.banners || []);
          renderAnnouncementList(allAnnouncementsData);
          if (data.popups && data.popups.length > 0) showPopups(data.popups);
        }
      } catch (error) { console.error("โหลดประกาศล้มเหลว:", error); }
    }

    async function loadUserProfile() {
      if (!currentUser) return;
      try {
        const response = await fetch(`/api/profile/${currentUser.EmpID}`);
        const result = await response.json();
        if (result.success) {
          const user = result.user;
          document.getElementById('profileName').innerText = user.FullName;
          document.getElementById('profileRole').innerText = user.Role;
          document.getElementById('profileEmpId').innerText = user.EmpID;
          document.getElementById('profileLevel').innerText = user.Level;
          document.getElementById('profileDept').innerText = user.FullDept;
          document.getElementById('profilePosition').innerText = user.FullPosition;
          if(user.ProfilePic) document.getElementById('profilePicBig').src = user.ProfilePic;
        }
      } catch (error) { console.error("โหลดโปรไฟล์ล้มเหลว:", error); }
    }

    async function renderGlobalDashboard() {
      try {
        const response = await fetch('/api/global-stats');
        const data = await response.json();
        if (data.success) {
          document.getElementById('gdTotalScore').innerText = data.totalScore;
          document.getElementById('gdTotalStaff').innerText = data.totalStaff;
          document.getElementById('gdAvgScore').innerText = data.avgScore;
        }
      } catch (error) { console.error("โหลดสถิติล้มเหลว:", error); }
    }

    // --- 4. ช่างวาดหน้าจอประกาศ (Home Renderers) ---
    function renderBanners(banners) {
      const container = document.getElementById('homeCarouselContainer');
      if (banners.length === 0) {
        container.innerHTML = `<div class="card bg-purple text-white p-5 text-center" style="border-radius:15px;"><h3>🚀 HRD HUB 2026</h3><p>ยินดีต้อนรับสู่ระบบ Local Server</p></div>`;
        return;
      }
      let indicators = '', innerItems = '';
      banners.forEach((banner, index) => {
        const activeClass = index === 0 ? 'active' : '';
        indicators += `<button type="button" data-bs-target="#homeCarousel" data-bs-slide-to="${index}" class="${activeClass}"></button>`;
        innerItems += `
          <div class="carousel-item ${activeClass}" onclick="if('${banner.link}') window.open('${banner.link}', '_blank')" style="cursor:pointer;">
            <img src="${banner.image}" class="d-block w-100" style="height:350px; object-fit:cover; border-radius:15px;">
            <div class="carousel-caption d-none d-md-block" style="background: rgba(0,0,0,0.5); border-radius: 10px;"><h5>${banner.title}</h5></div>
          </div>`;
      });
      container.innerHTML = `<div id="homeCarousel" class="carousel slide carousel-fade shadow-sm" data-bs-ride="carousel" style="border-radius:15px; overflow:hidden;"><div class="carousel-indicators">${indicators}</div><div class="carousel-inner">${innerItems}</div><button class="carousel-control-prev" type="button" data-bs-target="#homeCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button><button class="carousel-control-next" type="button" data-bs-target="#homeCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button></div>`;
    }

    function renderAnnouncementList(all) {
      const container = document.getElementById('announcementListContainer');
      if (all.length === 0) {
        container.innerHTML = '<div class="text-center py-4 text-muted">ไม่มีข่าวสารประกาศ</div>';
        return;
      }
      let html = '';
      all.forEach(ann => {
        html += `<a href="javascript:void(0);" class="list-group-item list-group-item-action border-0 py-3" onclick="viewOldAnnouncement('${ann.id}')"><div class="d-flex align-items-center"><img src="${ann.image}" style="width: 60px; height: 40px; object-fit: cover; border-radius: 5px;" class="me-3"><div class="flex-grow-1"><h6 class="mb-0 fw-bold">${ann.title}</h6></div><i class="bi bi-chevron-right text-muted"></i></div></a>`;
      });
      container.innerHTML = html;
    }

    function showPopups(popups) {
      if (sessionStorage.getItem('popup_shown')) return;
      openAnnouncementModal(popups[0]);
      sessionStorage.setItem('popup_shown', 'true');
    }

    function viewOldAnnouncement(id) {
      const ann = allAnnouncementsData.find(a => a.id === id);
      if (ann) openAnnouncementModal(ann);
    }

    function openAnnouncementModal(annData) {
      document.getElementById('popupImage').src = annData.image;
      if (annData.link) document.getElementById('popupLink').href = annData.link;
      new bootstrap.Modal(document.getElementById('announcementModal')).show();
    }

    // --- 5. ระบบจัดการ Profile (อัปโหลดรูป / แก้ไขข้อมูล / เปลี่ยนรหัส) ---
    
    // อัปโหลดรูปโปรไฟล์
    function uploadProfilePic(event) {
      const file = event.target.files[0];
      if(!file) return;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64Image = e.target.result;
        document.getElementById('profilePicBig').style.opacity = '0.5'; // ทำภาพเบลอตอนโหลด

        try {
          const res = await fetch('/api/upload-profile-pic', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ empId: currentUser.EmpID, base64Image: base64Image })
          });
          const data = await res.json();
          if(data.success) {
            currentUser.ProfilePic = base64Image;
            document.getElementById('profilePicBig').src = base64Image;
            document.getElementById('navProfilePic').src = base64Image;
          } else { alert(data.message); }
        } catch(err) { alert('การเชื่อมต่อขัดข้อง'); }
        
        document.getElementById('profilePicBig').style.opacity = '1';
      };
      reader.readAsDataURL(file); // แปลงไฟล์เป็น Base64
    }

    // เปิดหน้าต่างแก้ไขข้อมูล
    function openEditProfile() {
      document.getElementById('editFullName').value = currentUser.FullName || '';
      document.getElementById('editShortDept').value = currentUser.ShortDept || '';
      document.getElementById('editFullDept').value = currentUser.FullDept || '';
      document.getElementById('editLevel').value = currentUser.Level || '';
      document.getElementById('editPosition').value = currentUser.FullPosition || '';
      new bootstrap.Modal(document.getElementById('editProfileModal')).show();
    }

    // บันทึกข้อมูลส่วนตัว
    async function saveProfile() {
      const btn = document.getElementById('btnSaveProfile');
      btn.innerHTML = 'กำลังบันทึก...';
      btn.disabled = true;
      
      const payload = {
        empId: currentUser.EmpID,
        fullName: document.getElementById('editFullName').value,
        shortDept: document.getElementById('editShortDept').value,
        fullDept: document.getElementById('editFullDept').value,
        level: document.getElementById('editLevel').value,
        fullPosition: document.getElementById('editPosition').value
      };

      try {
        const res = await fetch('/api/update-profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if(data.success) {
          // อัปเดตข้อมูลในหน้าจอทันทีโดยไม่ต้องโหลดใหม่
          currentUser.FullName = payload.fullName;
          currentUser.ShortDept = payload.shortDept;
          currentUser.FullDept = payload.fullDept;
          currentUser.Level = payload.level;
          currentUser.FullPosition = payload.fullPosition;
          
          document.getElementById('navUserName').innerText = currentUser.FullName;
          bootstrap.Modal.getInstance(document.getElementById('editProfileModal')).hide();
          loadUserProfile(); // รีเฟรชหน้าโปรไฟล์
        } else { alert(data.message); }
      } catch(e) { alert('Error: ' + e); }
      
      btn.innerHTML = 'บันทึกการเปลี่ยนแปลง';
      btn.disabled = false;
    }

    // เปิดหน้าต่างเปลี่ยนรหัสผ่าน
    function openChangePassword() {
      document.getElementById('changePasswordForm').reset();
      new bootstrap.Modal(document.getElementById('changePasswordModal')).show();
    }

    // บันทึกรหัสผ่านใหม่
    async function savePassword() {
      const p1 = document.getElementById('newPassword').value;
      const p2 = document.getElementById('confirmPassword').value;
      if(p1 !== p2) return alert('รหัสผ่านไม่ตรงกัน!');

      const btn = document.getElementById('btnSavePassword');
      btn.innerHTML = 'กำลังบันทึก...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/update-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ empId: currentUser.EmpID, newPassword: p1 })
        });
        const data = await res.json();
        alert(data.message);
        if(data.success) bootstrap.Modal.getInstance(document.getElementById('changePasswordModal')).hide();
      } catch(e) { alert('Error: ' + e); }
      
      btn.innerHTML = 'บันทึกรหัสผ่านใหม่';
      btn.disabled = false;
    } 

    // --- ฟังก์ชันค้นหาพนักงานรายบุคคล ---
async function execStaffSearch() {
  const keyword = document.getElementById('gdSearchKeyword').value;
  const dept = document.getElementById('gdSearchDept').value;
  const resultsContainer = document.getElementById('gdSearchResults');
  
  resultsContainer.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-purple"></div></div>';

  try {
    const response = await fetch(`/api/staff-search?keyword=${keyword}&dept=${dept}`);
    const result = await response.json();
    
    if (result.success && result.data.length > 0) {
      let html = '';
      result.data.forEach(user => {
        html += `
          <div class="col-md-4 mb-3">
            <div class="card staff-card p-3 shadow-sm" onclick="showStaffPortfolio('${user.EmpID}')">
              <div class="d-flex align-items-center">
                <img src="${user.ProfilePic || 'https://via.placeholder.com/50'}" class="rounded-circle me-3" style="width:50px; height:50px; object-fit:cover;">
                <div>
                  <h6 class="mb-0 fw-bold">${user.FullName}</h6>
                  <small class="text-muted">${user.ShortDept}</small>
                </div>
              </div>
            </div>
          </div>`;
      });
      resultsContainer.innerHTML = html;
    } else {
      resultsContainer.innerHTML = '<div class="col-12 text-center py-5 text-muted">ไม่พบข้อมูลพนักงานที่ระบุ</div>';
    }
  } catch (error) {
    console.error("Search failed:", error);
  }
}
