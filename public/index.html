<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRD HUB - กฟก.3 (Local)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    /* ... (CSS ทั้งหมดของกัปตันคงไว้ที่เดิม) ... */
    body { background-color: #f4f6f9; font-family: 'Sarabun', sans-serif; overflow-x: hidden; }
    .bg-purple { background-color: #4a148c; color: white; }
    #sidebar-container { width: 250px; transition: all 0.3s ease; background: white; border-right: 1px solid #dee2e6; z-index: 1000; height: calc(100vh - 60px); overflow-y: auto; }
    #sidebar-container.collapsed { margin-left: -250px; }
    #main-content { flex-grow: 1; min-width: 0; height: calc(100vh - 60px); overflow-y: auto; }
    .app-page { display: none; }
    .app-page.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .quick-menu-card { cursor: pointer; transition: 0.3s ease; border-radius: 15px; }
    .quick-menu-card:hover { transform: translateY(-5px); background-color: #f8f9fa; }
    .gold-gradient { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7); color: #4a148c; }
    .purple-gradient { background: linear-gradient(135deg, #4a148c, #311b92); color: white; }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); border-radius: 15px; }
  </style>
</head>
<body>

  <div id="login-section">...</div>

  <div id="app-section" style="display: none;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-purple sticky-top shadow-sm" style="height: 60px;">...</nav>

    <div class="d-flex" style="overflow: hidden;">
      <div id="sidebar-container" class="shadow-sm pt-3">
        <ul class="nav flex-column" id="sidebarMenu"></ul>
      </div>

      <div id="main-content" class="bg-light w-100 p-3 p-md-4">
        <div id="page-home" class="app-page"></div>
        <div id="page-profile" class="app-page"></div>
        <div id="page-global-dash" class="app-page"></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="announcementModal" tabindex="-1">...</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
<script src="/js/main.js"></script> 
<script src="/js/home.js"></script>
<script src="/js/profile.js"></script>
<script src="/js/global-dash.js"></script>

</body>
</html>
